<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sighting Stats</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav>
    <a href="/">Home</a>
    <a href="/sightings/new">Log Sighting</a>
    <a href="/sightings/search">Search</a>
    <a href="/stats">Stats</a>
</nav>

<h1>📊 Sighting Stats</h1>

{{ if .counts }}
<table class="stat-table">
    <thead>
    <tr>
        <th>Animal</th>
        <th>Sightings</th>
    </tr>
    </thead>
    <tbody>
    {{ range .counts }}
    <tr>
        <td>{{ .Animal }}</td>
        <td>{{ .Count }}</td>
    </tr>
    {{ end }}
    </tbody>
</table>
<p class="total">Total sightings logged: <strong>{{ .total }}</strong></p>
{{ else }}
<p class="empty">No sightings logged yet. <a href="/sightings/new">Add the first one!</a></p>
{{ end }}

<script src="/static/js/main.js" defer></script>
</body>
</html>
