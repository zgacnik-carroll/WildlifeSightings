<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav>
    <a href="/" class="nav-brand">Wildlife Sightings</a>
    <div class="nav-links">
        <a href="/login">Login</a>
        <a href="/register" class="active">Register</a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header auth-page-header">
        <div>
            <div class="page-title">Create an account</div>
            <div class="page-sub">Start logging your wildlife sightings</div>
        </div>
    </div>

    {{ if .error }}
    <div class="error-box">{{ .error }}</div>
    {{ end }}

    <div class="form-card">
        <form id="register-form" action="/register" method="POST">
            <label for="username">Username</label>
            <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Choose a username"
                    value="{{ .username }}"
                    autocomplete="off"
                    required
            >

            <label for="password">Password</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Choose a password"
                    required
            >

            <br><br>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <p class="form-footer">Already have an account? <a href="/login">Sign in here</a></p>
    </div>
</div>

<script src="/static/js/main.js" defer></script>
</body>
</html>
