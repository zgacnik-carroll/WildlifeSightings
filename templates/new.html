<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log a Sighting</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav>
    <a href="/">Home</a>
    <a href="/sightings/new">Log Sighting</a>
    <a href="/sightings/search">Search</a>
    <a href="/stats">Stats</a>
</nav>

<h1>📋 Log a Sighting</h1>

<form action="/sightings" method="POST">
    <label for="animal">Animal</label>
    <input
            type="text"
            id="animal"
            name="animal"
            placeholder="e.g. Grizzly Bear"
            autocomplete="off"
    >

    <label for="location">Location</label>
    <input
            type="text"
            id="location"
            name="location"
            placeholder="e.g. Glacier National Park"
            autocomplete="off"
    >

    <label for="notes">Notes</label>
    <textarea
            id="notes"
            name="notes"
            placeholder="Any extra details — behaviour, time of day, number of animals..."
    ></textarea>

    <button type="submit">Save Sighting</button>
</form>

<script src="/static/js/main.js" defer></script>
</body>
</html>
