<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log a Sighting</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav>
    <a href="/" class="nav-brand">Wildlife Sightings</a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/sightings/new" class="active">Log Sighting</a>
        <a href="/sightings/search">Search</a>
        <a href="/stats">Stats</a>
        <a href="/profile">{{ .username }}</a>
        <form action="/logout" method="POST" style="display:inline;">
            <button type="submit" class="nav-logout">Logout</button>
        </form>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <div>
            <div class="page-title">Log a Sighting</div>
            <div class="page-sub">Record a new wildlife observation</div>
        </div>
    </div>

    <div class="form-card">
        <form id="new-sighting-form" action="/sightings" method="POST">
            <label for="animal">Animal</label>
            <input
                    type="text"
                    id="animal"
                    name="animal"
                    placeholder="e.g. Grizzly Bear"
                    autocomplete="off"
            >

            <label for="location">Location</label>
            <input
                    type="text"
                    id="location"
                    name="location"
                    placeholder="e.g. Glacier National Park"
                    autocomplete="off"
            >

            <label for="notes">Notes</label>
            <textarea
                    id="notes"
                    name="notes"
                    placeholder="Any extra details — behaviour, time of day, number of animals..."
            ></textarea>

            <br><br>
            <button type="submit" class="btn">Save Sighting</button>
        </form>
    </div>
</div>

<script src="/static/js/main.js" defer></script>
</body>
</html>
