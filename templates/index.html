<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildlife Sightings</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav>
    <a href="/">Home</a>
    <a href="/sightings/new">Log Sighting</a>
    <a href="/sightings/search">Search</a>
    <a href="/stats">Stats</a>
</nav>

<h1>🦌 Wildlife Sightings</h1>

{{ if .sightings }}
{{ range .sightings }}
<div class="sighting">
    <h3>{{ .Animal }}</h3>
    <p>📍 {{ .Location }}</p>
    {{ if .Notes }}
    <p>📝 {{ .Notes }}</p>
    {{ end }}
</div>
{{ end }}
{{ else }}
<p class="empty">No sightings yet. <a href="/sightings/new">Log the first one!</a></p>
{{ end }}

<script src="/static/js/main.js" defer></script>
</body>
</html>
